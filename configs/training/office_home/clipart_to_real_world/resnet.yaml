io:
  feature_bank: fps_h5cache/banks/office_home_resnet50.h5
  source_domain: Clipart
  target_domain: Real World
  feature_transform: sqrt
  num_classes: 65
  device: cuda:0
views:
  src:
    key: pad_resize256_input256_direct_orig_clean,pad_resize256_input256_direct_hflip_clean
    combine: stack
  entropy:
    key: pad_resize256_input256_direct_orig_clean,pad_resize256_input256_direct_hflip_clean
    combine: stack
  cr:
    view1:
      key: pad_resize256_input256_direct_orig_pool_a,pad_resize256_input256_direct_hflip_pool_a,pad_resize256_input256_direct_orig_pool_b,pad_resize256_input256_direct_hflip_pool_b,pad_resize256_input256_direct_orig_pool_c,pad_resize256_input256_direct_hflip_pool_c,pad_resize256_input256_direct_orig_pool_d,pad_resize256_input256_direct_hflip_pool_d
      combine: stack
    view2:
      key: pad_resize256_input256_direct_orig_pool_e,pad_resize256_input256_direct_hflip_pool_e,pad_resize256_input256_direct_orig_pool_f,pad_resize256_input256_direct_hflip_pool_f,pad_resize256_input256_direct_orig_pool_g,pad_resize256_input256_direct_hflip_pool_g,pad_resize256_input256_direct_orig_pool_h,pad_resize256_input256_direct_hflip_pool_h
      combine: stack
  eval:
    key: pad_resize256_input256_direct_orig_clean,pad_resize256_input256_direct_hflip_clean
    combine: mean
optimization:
  base_lr: 0.003
  momentum: 0.9
  optimizer: sgd
  nesterov: false
  weight_decay: 0.0
  lr_schedule: linear_step
  min_lr: 0.0
schedule:
  seed: 0
  iter_num: 5000
  alpha: 0.4
  beta: 0.8
  alpha_0: 0.1
  beta_0: 0.1
  schedule_tau: 1000
  dynamic_parameters: true
normalization:
  normalize: cross_norm
  cross_norm_scale: 0.4
  self_norm_scale_src: 1
  self_norm_scale_tgt: 1
losses:
  use_consistency_loss: true
  use_correction: false
  use_shift_constraint: false
  use_classes_weight: true
  baseline: false
  use_lse: true
  use_lce: true
  use_lcr: true
  lambda_lcr: 0.3
  lcr_loss: mse
  lcr_sample_weight: paper
  pseudo_margin: true
  margin_start_step: 100
  use_temperature: false
  begin_temperature: 30
  use_geom_test: false
  geom_alpha: 1
  geom_beta: 1
  sparse_weight_a: 5
  sample_entropy_type: shannon
  margin_quantile: 0.01
  margin_weight_type: normalized_logit_gap
  margin_convert_mode: quantile_sigmoid
  margin_sigmoid_tau: 0.2
  margin_sigmoid_boundary_weight: 0.9
eval:
  multi_class: true
  eval_interval: 20
  progress: true
